version: '3.2'

services:

  scaphandre:
    container_name: scaphandre
    build:
      context: ..
    privileged: true
    ports:
      - "8089:8080"
    volumes:
      - type: bind
        source: /proc
        target: /proc
      - type: bind
        source: /sys/class/powercap
        target: /sys/class/powercap
      - type: bind
        source: /sys/kernel/debug
        target: /sys/kernel/debug
        read_only: true
      - type: bind
        source: /sys/fs/bpf
        target: /sys/fs/bpf
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    command: ["-vvvv", "prometheus", "--containers"]
    environment:
      RUST_BACKTRACE: "full"
    networks:
      - scaphandre-network

  prometheus:
    container_name: prometheus
    build:
      context: ./prom-dev
    ports:
      - "9099:9090"
    volumes:
      - promdata-scaphandre:/prometheus
    networks:
      - scaphandre-network

  grafana:
    container_name: grafana
    build:
      context: ./grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "secret"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/sample/sample-dashboard.json"
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    networks:
      - scaphandre-network
    volumes:
      - type: bind
        source: "./dashboards/sample-dashboard.json"
        target: "/var/lib/grafana/dashboards/sample/sample-dashboard.json"

volumes:
  promdata-scaphandre:

networks:
  scaphandre-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.33.0/24
